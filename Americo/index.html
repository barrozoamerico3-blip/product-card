<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Ténis</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <main class="container">

        <div class="card">
            <div class="badge green">Novo</div>
            <div class="favorite">❤</div>
            <div class="image-box">
                <img src="https://images.unsplash.com/photo-1608231387042-66d1773070a5?w=500" alt="Ténis Adidas Ultraboost">
            </div>
            <div class="content">
                <h2>Adidas Ultraboost</h2>
                <div class="rating">★★★★★ <span>(4.8)</span></div>
                <p>Conforto máximo com tecnologia Boost. Ideal para treinos e passeios.</p>
                <div class="price-area">
                    <span class="old-price">€129.99</span>
                    <span class="price">€99.99</span>
                </div>
                <button>Adicionar ao Carrinho</button>
            </div>
        </div>

    </main>

</body>
</html>
